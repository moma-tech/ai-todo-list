<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Todo List</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>📝 AI Todo List</h1>
    </header>
    
    <main>
      <section class="add-todo">
        <form id="todo-form">
          <input type="text" id="todo-input" placeholder="Add a new todo..." required>
          <input type="date" id="date-input" title="Scheduled date">
          <button type="submit" class="btn btn-primary">Add</button>
        </form>
      </section>
      
      <section class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </section>
      
      <section class="todo-list" id="todo-list">
        <p class="loading">Loading...</p>
      </section>
      
      <section class="stats" id="stats"></section>
    </main>
    
    <div id="modal" class="modal hidden">
      <div class="modal-content">
        <h2>Edit Todo</h2>
        <form id="edit-form">
          <input type="hidden" id="edit-id">
          <input type="text" id="edit-title" required>
          <input type="date" id="edit-date">
          <label class="checkbox-label">
            <input type="checkbox" id="edit-completed">
            Completed
          </label>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancel-edit">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  
  <script src="/js/app.js"></script>
</body>
</html>
